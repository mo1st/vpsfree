<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Email Scraper</title>
  <style>
    body {
      width: 600px;
      padding: 15px;
      font-family: Arial, sans-serif;
      font-size: 13px;
    }
    
    h2 {
      margin: 0 0 10px 0;
      font-size: 16px;
    }
    
    .input-group {
      margin-bottom: 15px;
    }
    
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }
    
    textarea {
      width: 100%;
      height: 100px;
      padding: 5px;
      box-sizing: border-box;
      font-family: monospace;
      font-size: 12px;
    }
    
    button {
      padding: 8px 16px;
      background-color: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
      font-size: 13px;
      border-radius: 3px;
    }
    
    button:hover {
      background-color: #45a049;
    }
    
    button:disabled {
      background-color: #cccccc;
      cursor: not-allowed;
    }
    
    #status {
      margin-top: 10px;
      padding: 8px;
      border-radius: 3px;
      display: none;
    }
    
    #status.success {
      background-color: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    
    #status.error {
      background-color: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    
    #status.info {
      background-color: #d1ecf1;
      color: #0c5460;
      border: 1px solid #bee5eb;
    }
    
    #results {
      margin-top: 20px;
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }
    
    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: left;
    }
    
    th {
      background-color: #f2f2f2;
      font-weight: bold;
    }
    
    tr:nth-child(even) {
      background-color: #f9f9f9;
    }
    
    .export-buttons {
      margin-top: 10px;
    }
    
    /* NEW: Settings fieldset styles */
    fieldset {
      border: 1px solid #ddd;
      border-radius: 5px;
      padding: 10px;
      margin-bottom: 15px;
    }
    
    legend {
      font-weight: bold;
      padding: 0 5px;
    }
    
    .settings-row {
      margin-bottom: 8px;
    }
    
    .checkbox-label {
      display: inline-block;
      font-weight: normal;
      margin-left: 5px;
    }
    
    .inline-input {
      display: inline-block;
      width: 60px;
      padding: 3px;
      margin-left: 5px;
    }
    
    .keywords-input {
      width: 100%;
      height: 50px;
      padding: 5px;
      box-sizing: border-box;
      font-size: 12px;
      margin-top: 5px;
    }
    
    .validation-warning {
      color: #856404;
      background-color: #fff3cd;
      border: 1px solid #ffeeba;
      padding: 5px;
      border-radius: 3px;
      font-size: 11px;
      margin-top: 5px;
      display: none;
    }
    
    .help-text {
      font-size: 11px;
      color: #666;
      margin-top: 3px;
    }
  </style>
</head>
<body>
  <h2>Email Scraper</h2>
  
  <!-- NEW: Settings Section -->
  <fieldset>
    <legend>Crawl Settings</legend>
    
    <div class="settings-row">
      <label>Page Categories to Follow:</label>
      <div>
        <input type="checkbox" id="followAbout" checked>
        <label for="followAbout" class="checkbox-label">About pages</label>
      </div>
      <div>
        <input type="checkbox" id="followContact" checked>
        <label for="followContact" class="checkbox-label">Contact pages</label>
      </div>
      <div>
        <input type="checkbox" id="followOther">
        <label for="followOther" class="checkbox-label">Other/Custom pages</label>
      </div>
    </div>
    
    <div class="settings-row" id="otherKeywordsRow" style="display: none;">
      <label for="otherKeywords">Custom Keywords (comma or newline separated):</label>
      <textarea id="otherKeywords" class="keywords-input" placeholder="team,company,impressum,imprint"></textarea>
      <div class="help-text">Keywords to identify custom pages (case-insensitive)</div>
    </div>
    
    <div class="settings-row">
      <label>
        Max extra pages per domain:
        <input type="number" id="maxExtraPages" class="inline-input" min="0" max="10" value="3">
      </label>
      <div class="help-text">Maximum additional pages to crawl per domain (0-10, excluding root page)</div>
      <div id="maxPagesWarning" class="validation-warning">Value must be between 0 and 10</div>
    </div>
    
    <div class="settings-row">
      <input type="checkbox" id="stopAfterFirstEmail" checked>
      <label for="stopAfterFirstEmail" class="checkbox-label">Stop crawling domain after first email found</label>
    </div>
  </fieldset>
  
  <div class="input-group">
    <label for="urls">Enter URLs (one per line):</label>
    <textarea id="urls" placeholder="https://example.com&#10;https://www.bing.com/search?q=...&#10;https://another-site.com"></textarea>
  </div>
  
  <button id="scrapeBtn">Start Scraping</button>
  <button id="clearBtn" style="background-color: #f44336; margin-left: 10px;">Clear Results</button>
  
  <div id="status"></div>
  
  <div id="results" style="display: none;">
    <h3>Results</h3>
    <div class="export-buttons">
      <button id="exportCsvBtn" style="background-color: #2196F3;">Export as CSV</button>
      <button id="exportJsonBtn" style="background-color: #FF9800; margin-left: 10px;">Export as JSON</button>
    </div>
    <div id="resultsTable"></div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
